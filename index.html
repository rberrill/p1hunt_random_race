<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open Wheel Grand Dash</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="dashboard">
      <header class="topbar">
        <h1>Open Wheel Grand Dash</h1>
        <p class="subtitle">Precision race simulator with dynamic pace changes across corners and long straights.</p>
      </header>

      <section class="control-panel">
        <div class="input-block">
          <label for="nameInput">Driver names (one per line, up to 100)</label>
          <textarea id="nameInput" placeholder="Alex\nJordan\nCasey\nTaylor"></textarea>
        </div>

        <div class="race-config">
          <label for="lapsInput">Laps</label>
          <input id="lapsInput" type="number" min="1" max="50" value="6" />
          <button id="startBtn" type="button">Start Race</button>
          <button id="resetBtn" type="button" class="secondary">Reset</button>
        </div>

        <div class="telemetry">
          <div class="tile">
            <span class="tile-label">Race Status</span>
            <span id="status" class="tile-value">Add at least 2 drivers to begin.</span>
          </div>
          <div class="tile">
            <span class="tile-label">Track Profile</span>
            <span id="trackProfile" class="tile-value">Waiting</span>
          </div>
          <div class="tile">
            <span class="tile-label">Leader</span>
            <span id="leaderName" class="tile-value">—</span>
          </div>
          <div class="tile winner-tile">
            <span class="tile-label">Winner</span>
            <span id="winner" class="tile-value" aria-live="polite"></span>
          </div>
        </div>
      </section>

      <section class="center-stage" aria-label="Race Track Dashboard">
        <div class="track-frame">
          <svg id="trackSvg" viewBox="0 0 1200 720" role="img" aria-label="Open-wheel race track with two long straights and mixed corners">
            <defs>
              <linearGradient id="asphalt" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#2b3139" />
                <stop offset="100%" stop-color="#171b20" />
              </linearGradient>
              <linearGradient id="runoff" x1="0" y1="0" x2="1" y2="0">
                <stop offset="0%" stop-color="#0057ff" />
                <stop offset="100%" stop-color="#00a2ff" />
              </linearGradient>
            </defs>

            <rect x="0" y="0" width="1200" height="720" fill="#0a2a16" />

            <path
              d="M 160 210
                 C 210 130, 330 110, 500 125
                 L 930 135
                 C 1040 145, 1110 220, 1070 300
                 C 1030 380, 930 410, 850 410
                 C 780 410, 735 455, 735 520
                 C 735 590, 800 640, 920 630
                 L 470 625
                 C 330 620, 220 585, 170 530
                 C 120 475, 125 390, 205 350
                 C 295 305, 305 250, 225 228
                 C 193 220, 170 217, 160 210 Z"
              fill="url(#asphalt)"
            />

            <path
              d="M 185 236
                 C 225 170, 338 155, 500 168
                 L 900 175
                 C 980 182, 1033 236, 1008 290
                 C 982 344, 915 368, 852 368
                 C 748 368, 688 437, 688 520
                 C 688 598, 762 602, 864 595
                 L 500 588
                 C 368 586, 268 557, 222 509
                 C 176 461, 181 404, 246 370
                 C 334 323, 349 242, 239 230
                 C 208 228, 191 233, 185 236 Z"
              fill="none"
              stroke="url(#runoff)"
              stroke-width="18"
              stroke-linejoin="round"
              opacity="0.4"
            />

            <path
              id="lanePath"
              d="M 190 238
                 C 228 177, 338 162, 498 175
                 L 898 182
                 C 972 188, 1017 238, 994 289
                 C 970 341, 910 362, 851 362
                 C 740 362, 675 437, 675 522
                 C 675 605, 758 596, 855 589
                 L 500 582
                 C 371 580, 278 554, 236 510
                 C 194 468, 199 409, 258 378
                 C 343 335, 359 244, 247 231
                 C 213 227, 196 233, 190 238 Z"
              fill="none"
              stroke="#dce6f5"
              stroke-width="7"
              stroke-linecap="round"
              stroke-dasharray="16 14"
            />

            <circle cx="190" cy="238" r="14" fill="#ffffff" />
            <text x="218" y="245" fill="#ffffff" font-size="23" font-weight="700">START / FINISH</text>

            <g id="carsLayer"></g>
          </svg>
        </div>

        <aside class="leaderboard-wrap">
          <h2>Live Leaderboard</h2>
          <ol id="leaderboard" class="leaderboard"></ol>
        </aside>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
